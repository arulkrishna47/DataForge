version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cortexa_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: cortexa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: cortexa_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/cortexa?schema=public
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=supersecretjwtkey_change_in_production
      - JWT_EXPIRES_IN=7d
    depends_on:
      - db
    volumes:
      - ./server:/usr/src/app

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    container_name: cortexa_client
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data:
